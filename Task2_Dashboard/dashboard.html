<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f0f0f0; }
    h2 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #4CAF50; color: white; }
    .controls { margin-bottom: 15px; }
    select { padding: 8px; margin-right: 10px; border-radius: 4px; border: 1px solid #ccc; }
    #status { color: gray; font-style: italic; }
  </style>
</head>
<body>
  <h2>Student Dashboard</h2>
  <div class="controls">
    <label>Filter by Department: </label>
    <select id="deptFilter" onchange="loadStudents()">
      <option value="">All</option>
      <option>CSE</option><option>ECE</option><option>MECH</option>
    </select>
    <label>Sort by: </label>
    <select id="sortBy" onchange="loadStudents()">
      <option value="name">Name</option>
      <option value="dob">DOB</option>
    </select>
  </div>
  <p id="status">Loading...</p>
  <table id="studentTable">
    <thead>
      <tr><th>Name</th><th>Email</th><th>DOB</th><th>Department</th><th>Phone</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <script>
    function loadStudents() {
      const dept = document.getElementById("deptFilter").value;
      const sort = document.getElementById("sortBy").value;
      document.getElementById("status").textContent = "Loading...";
      fetch(`fetch_students.php?dept=${dept}&sort=${sort}`)
        .then(r => r.json())
        .then(data => {
          document.getElementById("status").textContent = `${data.length} record(s) found.`;
          const tbody = document.getElementById("tableBody");
          tbody.innerHTML = "";
          data.forEach(s => {
            tbody.innerHTML += `<tr>
              <td>${s.name}</td><td>${s.email}</td><td>${s.dob}</td>
              <td>${s.department}</td><td>${s.phone}</td>
            </tr>`;
          });
        });
    }
    loadStudents();
  </script>
</body>
</html>
